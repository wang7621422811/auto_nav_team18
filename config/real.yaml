# Real-hardware deployment overrides.
# Values here shadow the defaults in robot.yaml / lidar.yaml / camera.yaml.
# This file is the ONLY place to change hardware-specific paths, IPs, and
# measured sensor extrinsics for the real robot.

/**:
  ros__parameters:
    # Real chassis serial device.
    serial_port: "/dev/ttyUSB0"   # verify with: ls /dev/ttyUSB*

    # If your real robot differs from the simulation URDF, override the measured
    # base_link → sensor translation here. Leave these as-is when the mounting
    # matches pioneer.urdf closely.
    laser_x: 0.20
    laser_y: 0.00
    laser_z: 0.281
    camera_x: 0.24
    camera_y: 0.00
    camera_z: 0.261

# LiDAR driver selection still comes from the bringup launch argument
# ``lidar_type:=sick|lakibeam``. Host/IP overrides below are node-specific.
sick_scan:
  ros__parameters:
    hostname: "192.168.0.1"      # SICK scanner IP (check label on device)
    frame_id: "laser"
    scanner_type: "sick_tim_7xx" # must match actual model; options: sick_lms_5xx, sick_tim_7xx, sick_lms_1xx
    port: 2111

lakibeam_scan:
  ros__parameters:
    hostname: "192.168.1.200"    # Lakibeam IP (check label on device)
    frame_id: "laser"

camera:
  ros__parameters:
    mx_id: ""                     # leave empty for auto-detect, or set MX ID

aria_node:
  ros__parameters:
    serial_port: "/dev/ttyUSB0"
    port: "/dev/ttyUSB0"
