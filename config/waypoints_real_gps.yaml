# Outdoor GPS waypoint list (plain YAML, not a ROS2 parameter file).
#
# The origin below is the shared ENU reference used to convert every GPS
# waypoint into the same local planar frame. Keep it consistent with
# config/gps.yaml so live fixes and stored waypoints stay in one coordinate
# system.

origin:
  lat: 51.4788
  lon: -0.0106

waypoints:
  - name: wp1
    type: gps
    lat: -31.980512
    lon: 115.817364

  - name: wp2
