# ros_gz_bridge topic configuration — Pioneer 3-AT simulation (G2)
#
# ROS 2 Jazzy  +  Gazebo Harmonic (gz-sim 8)
# direction: ROS_TO_GZ | GZ_TO_ROS

- ros_topic_name: "/clock"
  gz_topic_name:  "/clock"
  ros_type_name:  "rosgraph_msgs/msg/Clock"
  gz_type_name:   "gz.msgs.Clock"
  direction:      GZ_TO_ROS

# Safety gate is the only motion output: bridge /cmd_vel_safe into Gazebo.
- ros_topic_name: "/cmd_vel_safe"
  gz_topic_name:  "/cmd_vel"
  ros_type_name:  "geometry_msgs/msg/Twist"
  gz_type_name:   "gz.msgs.Twist"
  direction:      ROS_TO_GZ

- ros_topic_name: "/odom"
  gz_topic_name:  "/odom"
  ros_type_name:  "nav_msgs/msg/Odometry"
  gz_type_name:   "gz.msgs.Odometry"
  direction:      GZ_TO_ROS

- ros_topic_name: "/tf"
  gz_topic_name:  "/tf"
  ros_type_name:  "tf2_msgs/msg/TFMessage"
  gz_type_name:   "gz.msgs.Pose_V"
  direction:      GZ_TO_ROS

- ros_topic_name: "/joint_states"
  gz_topic_name:  "/joint_states"
  ros_type_name:  "sensor_msgs/msg/JointState"
  gz_type_name:   "gz.msgs.Model"
  direction:      GZ_TO_ROS

# Step G2: LiDAR — gpu_lidar sensor publishes on gz topic /scan
- ros_topic_name: "/scan"
  gz_topic_name:  "/scan"
  ros_type_name:  "sensor_msgs/msg/LaserScan"
  gz_type_name:   "gz.msgs.LaserScan_V"
  direction:      GZ_TO_ROS

# Step G3: Camera — camera sensor topic "camera" → /camera/color/image_raw
- ros_topic_name: "/camera/color/image_raw"
  gz_topic_name:  "/camera"
  ros_type_name:  "sensor_msgs/msg/Image"
  gz_type_name:   "gz.msgs.Image"
  direction:      GZ_TO_ROS

- ros_topic_name: "/camera/color/camera_info"
  gz_topic_name:  "/camera/camera_info"
  ros_type_name:  "sensor_msgs/msg/CameraInfo"
  gz_type_name:   "gz.msgs.CameraInfo"
  direction:      GZ_TO_ROS
