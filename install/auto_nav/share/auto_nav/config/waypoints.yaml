# waypoints.yaml — ROS2 parameter file for PathFollowerNode (and WeavePlanner).
#
# Waypoint coordinate data lives in a SEPARATE file: config/waypoints_data.yaml
# (ROS2's rcl parameter parser does not support top-level YAML sequences,
#  so the data list must not appear in this file.)
#
# The launch script sets 'waypoints_file' to the absolute installed path of
# waypoints_data.yaml automatically — do not leave it as the empty string.

path_follower:
  ros__parameters:
    # Path to the plain-YAML waypoints data file (set by navigation.launch.py)
    waypoints_file: ""

    # Arrival thresholds
    coarse_arrival_radius_m: 2.5   # switch to "waiting for marker" inside this radius
    final_arrival_radius_m:  1.0   # waypoint considered complete inside this radius
    home_arrival_radius_m:   1.0   # home considered reached inside this radius

    # Final-approach geometry: lateral offset so the marker stays on the right
    pass_offset_m: 0.8

    # Velocity limits (must not exceed robot.yaml safety-gate values)
    max_linear_vel:  0.4   # m/s
    max_angular_vel: 1.0   # rad/s

    # Proportional controller gains
    k_angular: 1.5   # angular velocity = k_angular × heading_error
    k_linear:  0.4   # linear  velocity = k_linear  × distance  (reduced by cos²)

    # Control loop rate
    control_rate_hz: 10.0

weave_planner:
  ros__parameters:
    # Path to the plain-YAML waypoints data file (set by navigation.launch.py)
    waypoints_file: ""
