# Joystick / gamepad mapping for Sony DualShock / generic Bluetooth gamepad.
# All indices follow sensor_msgs/Joy convention (0-based).
# Change values here when switching controller models — never hardcode in nodes.

joystick:
  ros__parameters:
    # ------- Axis indices -------
    axis_linear_x: 1          # Left stick vertical   → forward/back
    axis_angular_z: 0         # Left stick horizontal → turn
    axis_deadman: 5           # Right trigger (RT / R2) — auto dead-man

    # ------- Button indices -------
    btn_auto_mode: 0          # X (cross) button   → enable AUTO mode
    btn_manual_mode: 1        # O (circle) button  → enable MANUAL mode
    btn_emergency_stop: 3     # △ (triangle)       → immediate E-stop

    # ------- Scaling -------
    scale_linear: 0.5         # m/s per unit axis deflection
    scale_angular: 1.0        # rad/s per unit axis deflection

    # ------- Dead-man threshold -------
    # Trigger axis range is [-1.0 … +1.0]; fully pressed ≈ +1.0
    deadman_threshold: 0.5    # trigger must exceed this to allow AUTO motion

    # ------- Watchdog -------
    joy_timeout_sec: 1.0      # seconds of silence before declaring disconnect
