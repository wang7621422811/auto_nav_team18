# Multi-node ROS 2 parameter file. Top-level keys MUST match running node names
# (see launch: Node(name='...')), NOT a logical name like "joystick". Otherwise
# nothing is applied — e.g. deadman_button would never reach gamepad_watchdog.
#
# evtest codes (BTN_TL2=312, BTN_TR2=313) are kernel key codes; they are NOT the
# same as sensor_msgs/Joy buttons[] indices. Always verify with:
#   ros2 topic echo /joy
# Press ZL/ZR alone and see which buttons[] entries flip (often 6/7 on Switch Pro,
# but drivers differ — trust /joy, not evtest index).

/joy:
  ros__parameters:
    deadzone: 0.5
    autorepeat_rate: 20.0
    sticky_buttons: false
    coalesce_interval_ms: 1

# teleop_twist_joy (ROS 2 Jazzy+) uses nested axis_linear / axis_angular, not axis_linear_x.
/teleop_twist_joy:
  ros__parameters:
    axis_linear:
      x: 1
    axis_angular:
      yaw: 2
    scale_linear:
      x: 0.5
    scale_angular:
      yaw: 1.0
    # Default true would force holding enable_button (often 0) to publish cmd_vel — conflicts with mode buttons.
    require_enable_button: false

/gamepad_watchdog:
  ros__parameters:
    axis_deadman: -1
    # ZR (BTN_TR2 in evtest) — set to the index that goes 1 when you press ZR in `ros2 topic echo /joy`
    deadman_button: 7
    deadman_threshold: 0.5
    joy_timeout_sec: 1.0

/joy_mapper:
  ros__parameters:
    btn_auto_mode: 0
    btn_manual_mode: 1
    btn_emergency_stop: 3

/cmd_gate:
  ros__parameters:
    gate_rate_hz: 10.0

# -----------------------------------------------------------------------------
# Reference — DualShock / generic (RT axis deadman): replace /gamepad_watchdog and
# /teleop_twist_joy blocks with something like:
#
# /teleop_twist_joy:
